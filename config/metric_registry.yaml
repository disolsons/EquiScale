gross_margin:
  inputs:
    - gross_profit
    - revenue
  operation: divide

operating_margin:
  inputs:
    - operating_income
    - revenue
  operation: divide

net_margin:
  inputs:
    - net_income
    - revenue
  operation: divide

free_cash_flow:
  inputs:
    - operating_cash_flow
    - capital_expenditures
  operation: subtract

free_cash_flow_margin:
  inputs:
    - free_cash_flow
    - revenue
  operation: divide

revenue_growth_yoy:
  inputs:
    - revenue
  operation: yoy_growth

net_income_growth_yoy:
  inputs:
    - net_income
  operation: yoy_growth

diluted_eps_growth_yoy:
  inputs:
    - diluted_eps
  operation: yoy_growth

roa_ending:
  inputs:
    - net_income
    - total_assets
  operation: divide

roe_ending:
  inputs:
    - net_income
    - shareholder_equity
  operation: divide

roa_avg_assets:
  inputs:
    - net_income
    - avg_total_assets
  operation: divide

roe_avg_equity:
  inputs:
    - net_income
    - avg_shareholder_equity
  operation: divide